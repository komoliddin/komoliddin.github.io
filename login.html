<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="shortcut icon" href="favicon/favicon.ico">
    <title>Вход в панель управления</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f141b; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .login-card { background: rgba(26, 34, 45, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-control { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; padding: 12px; }
        .form-control:focus { background: rgba(255,255,255,0.1); color: white; border-color: #0088cc; box-shadow: none; }
        .btn-login { background: #0088cc; color: white; border: none; border-radius: 12px; padding: 12px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-login:hover { background: #00aaff; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div id="app" class="login-card text-center">
        <img src="image/logo.png" width="80" class="mb-4 rounded-3">
        <h4 class="text-white fw-bold mb-4">ADMIN PANEL</h4>
        <input type="password" v-model="password" class="form-control mb-3" placeholder="Введите пароль..." @keyup.enter="login">
        <button @click="login" class="btn btn-login">ВОЙТИ</button>
        <p v-if="error" class="text-danger small mt-3">{{ error }}</p>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const password = ref('');
                const error = ref('');
                const login = () => {
                    if (password.value === 'Admin_123') {
                        sessionStorage.setItem('admin_access', 'granted');
                        window.location.href = 'admin.html';
                    } else {
                        error.value = 'Неверный пароль!';
                        password.value = '';
                    }
                };
                return { password, error, login };
            }
        }).mount('#app');
    </script>
</body>
</html>
