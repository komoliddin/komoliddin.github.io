<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель — Полный редактор</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f9; font-family: 'Inter', sans-serif; padding: 30px 0; }
        .admin-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 30px; margin-bottom: 25px; }
        .nav-pills .nav-link { border-radius: 12px; margin-right: 10px; color: #555; }
        .nav-pills .nav-link.active { background: #0088cc; color: white; }
        .form-control { border-radius: 12px; padding: 10px 15px; }
        .btn-save { background: #28a745; color: white; border: none; border-radius: 12px; padding: 12px 25px; font-weight: bold; }
        .btn-save:hover { background: #218838; }
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="container">
        <div class="top-header">
            <div>
                <h2 class="fw-bold m-0">PRO Projects Panel</h2>
                <p class="text-muted">Управление данными сайта</p>
            </div>
            <div class="d-flex gap-2">
                <button @click="exportAll" class="btn btn-save shadow-sm">
                    💾 СОХРАНИТЬ ВСЕ (DOWNLOAD JSON)
                </button>
                <a href="index.html" class="btn btn-outline-secondary rounded-pill">На сайт</a>
            </div>
        </div>

        <ul class="nav nav-pills mb-4">
            <li class="nav-item"><button class="nav-link" :class="{active: tab === 'projects'}" @click="tab = 'projects'">Проекты</button></li>
            <li class="nav-item"><button class="nav-link" :class="{active: tab === 'categories'}" @click="tab = 'categories'">Категории</button></li>
            <li class="nav-item"><button class="nav-link" :class="{active: tab === 'contacts'}" @click="tab = 'contacts'">Контакты & Соцсети</button></li>
            <li class="nav-item"><button class="nav-link" :class="{active: tab === 'donate'}" @click="tab = 'donate'">Донаты</button></li>
        </ul>

        <!-- ТАБ: ПРОЕКТЫ -->
        <div v-if="tab === 'projects'">
            <div class="admin-card">
                <h5 class="fw-bold mb-4">Добавить новый проект</h5>
                <div class="row g-3">
                    <div class="col-md-4"><input type="text" v-model="newP.name" placeholder="Название" class="form-control"></div>
                    <div class="col-md-4">
                        <select v-model="newP.category" class="form-control">
                            <option value="">Выберите категорию</option>
                            <option v-for="c in categories" :value="c.name">{{ c.name }}</option>
                        </select>
                    </div>
                    <div class="col-md-4"><input type="number" v-model="newP.price" placeholder="Цена" class="form-control"></div>
                    <div class="col-md-12"><textarea v-model="newP.description" placeholder="Описание" class="form-control" rows="2"></textarea></div>
                    <div class="col-md-12">
                        <button @click="addProject" class="btn btn-primary w-100 rounded-pill">Добавить проект</button>
                    </div>
                </div>
            </div>

            <div v-for="(p, idx) in products" :key="p.id" class="admin-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0">#{{ p.id }} — {{ p.name }}</h5>
                    <button @click="products.splice(idx, 1)" class="btn btn-danger btn-sm rounded-pill px-3">Удалить</button>
                </div>
                <div class="row g-3">
                    <div class="col-md-3"><label class="small text-muted">Название</label><input v-model="p.name" class="form-control"></div>
                    <div class="col-md-3"><label class="small text-muted">Категория</label>
                        <select v-model="p.category" class="form-control">
                            <option v-for="c in categories" :value="c.name">{{ c.name }}</option>
                        </select>
                    </div>
                    <div class="col-md-3"><label class="small text-muted">Цена</label><input type="number" v-model="p.price" class="form-control"></div>
                    <div class="col-md-12"><label class="small text-muted">Описание</label><textarea v-model="p.description" class="form-control"></textarea></div>
                    <div class="col-md-12">
                        <label class="small text-muted">Изображения (через запятую)</label>
                        <input :value="p.images?.join(', ')" @input="p.images = $event.target.value.split(',').map(i => i.trim())" class="form-control" placeholder="image/logo.png, image/shot1.png">
                    </div>
                </div>
            </div>
        </div>

        <!-- ТАБ: КАТЕГОРИИ -->
        <div v-if="tab === 'categories'">
            <div class="admin-card">
                <h5 class="fw-bold mb-4">Создать категорию</h5>
                <div class="input-group">
                    <input type="text" v-model="newCatName" class="form-control" placeholder="Имя категории...">
                    <button @click="addCategory" class="btn btn-primary px-4">Добавить</button>
                </div>
            </div>
            <div class="admin-card">
                <div v-for="(c, idx) in categories" :key="idx" class="d-flex justify-content-between align-items-center border-bottom py-2">
                    <span>{{ c.name }}</span>
                    <button @click="categories.splice(idx, 1)" class="btn btn-link text-danger text-decoration-none">Удалить</button>
                </div>
            </div>
        </div>

        <!-- ТАБ: КОНТАКТЫ & СОЦСЕТИ -->
        <div v-if="tab === 'contacts'">
            <div class="admin-card">
                <h5 class="fw-bold mb-4">Мои контакты</h5>
                <div class="row g-3">
                    <div class="col-md-6"><label class="small">Имя</label><input v-model="config.myContacts.name" class="form-control"></div>
                    <div class="col-md-6"><label class="small">Телефон</label><input v-model="config.myContacts.phone" class="form-control"></div>
                    <div class="col-md-6"><label class="small">Email</label><input v-model="config.myContacts.email" class="form-control"></div>
                    <div class="col-md-6"><label class="small">Telegram URL</label><input v-model="config.myContacts.telegram" class="form-control"></div>
                    <div class="col-md-12"><label class="small">Сайт</label><input v-model="config.myContacts.website" class="form-control"></div>
                </div>
            </div>
            <div class="admin-card">
                <h5 class="fw-bold mb-4">Основные соцсети</h5>
                <div v-for="s in config.socialLinks.main" class="row g-2 mb-3 align-items-center">
                    <div class="col-md-4"><strong>{{ s.name }}</strong></div>
                    <div class="col-md-8"><input v-model="s.url" class="form-control" placeholder="Ссылка..."></div>
                </div>
            </div>
        </div>

        <!-- ТАБ: ДОНАТЫ -->
        <div v-if="tab === 'donate'">
            <div class="admin-card">
                <h5 class="fw-bold mb-4">Методы доната</h5>
                <div v-for="m in config.donateMethods" class="mb-4 border-bottom pb-3">
                    <div class="row g-3">
                        <div class="col-md-4"><label class="small">Метод</label><input v-model="m.name" class="form-control"></div>
                        <div class="col-md-4"><label class="small">ID / Ссылка</label><input v-model="m.url || m.id" @input="m.url ? m.url = $event.target.value : m.id = $event.target.value" class="form-control"></div>
                        <div class="col-md-4"><label class="small">Текст подписи</label><input v-model="m.desc" class="form-control"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const tab = ref('projects');
                const products = ref([]);
                const categories = ref([]);
                const config = ref({ myContacts: {}, socialLinks: { main: [], others: [] }, donateMethods: [], publicStats: {} });
                
                const newP = ref({ name: '', category: '', price: 0, description: '', images: ['image/logo.png'] });
                const newCatName = ref('');

                const loadData = async () => {
                    // ПРОВЕРКА ВХОДА
                    if (sessionStorage.getItem('admin_access') !== 'granted') {
                        window.location.href = 'login.html';
                        return;
                    }

                    try {
                        products.value = await fetch('projects.json').then(r => r.json());
                        categories.value = await fetch('categories.json').then(r => r.json());
                        config.value = await fetch('config.json').then(r => r.json());
                    } catch (e) { console.warn("Load error. Use Export to save new files."); }
                };

                const addProject = () => { if(newP.value.name) { products.value.unshift({...newP.value, id: Date.now()}); newP.value.name=''; } };
                const addCategory = () => { if(newCatName.value) { categories.value.push({name: newCatName.value}); newCatName.value=''; } };

                const exportAll = async () => {
                    const payload = [
                        { filename: 'projects.json', data: products.value },
                        { filename: 'categories.json', data: categories.value },
                        { filename: 'config.json', data: config.value }
                    ];

                    try {
                        // Пытаемся сохранить через наш сервер
                        for (let item of payload) {
                            const res = await fetch('/save-data', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(item)
                            });
                            if (!res.ok) throw new Error('Server saving failed');
                        }
                        alert("✅ ДАННЫЕ УСПЕШНО ЗАПИСАНЫ В JSON-ФАЙЛЫ!");
                    } catch (e) {
                        console.log("Сервер сохранения не запущен. Переход на режим скачивания.");
                        // Фаллбэк (скачивание), если сервер не запущен
                        const exportFile = (data, name) => {
                            const blob = new Blob([JSON.stringify(data, null, 4)], { type: 'application/json' });
                            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click();
                        };
                        exportFile(products.value, 'projects.json');
                        exportFile(categories.value, 'categories.json');
                        exportFile(config.value, 'config.json');
                        alert("⚠️ Сервер сохранения не найден. Файлы СКАЧАНЫ вручную.");
                    }
                };

                onMounted(loadData);
                return { tab, products, categories, config, newP, newCatName, addProject, addCategory, exportAll };
            }
        }).mount('#app');
    </script>
</body>
</html>
