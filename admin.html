<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PRO Panel — Glass Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background: #f4f7f9; font-family: 'Inter', sans-serif; padding: 30px 0; transition: background 0.3s; }
        [data-theme="dark"] body { background: #0f141b; }
        .admin-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 30px; margin-bottom: 25px; border: 1px solid rgba(0,0,0,0.05); }
        .nav-pills .nav-link { border-radius: 12px; margin-right: 10px; color: #555; font-weight: 600; }
        .nav-pills .nav-link.active { background: #0088cc; color: white; }
        .form-control, .form-select { border-radius: 12px; padding: 10px 15px; border: 1px solid #e0e0e0; }
        .btn-save { background: #28a745; color: white; border: none; border-radius: 12px; padding: 12px 25px; font-weight: bold; }
        .gh-item { border-left: 5px solid #24292e !important; }
        .subcategory-box { height: 100px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 12px; padding: 8px; background: #fafafa; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="container">
        <div class="top-header d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold m-0 text-primary">PRO Panel v2.5</h2>
                <p class="text-muted">Управление проектами</p>
            </div>
            <div class="d-flex gap-3 align-items-center">
                <!-- ТЕМЫ В АДМИНКЕ -->
                <div class="theme-toggle shadow-sm">
                    <button class="theme-dot-btn" :class="{active: themeMode === 'dark'}" @click="applyTheme('dark')">ТЁМ</button>
                    <button class="theme-dot-btn" :class="{active: themeMode === 'auto'}" @click="applyTheme('auto')">АВТ</button>
                    <button class="theme-dot-btn" :class="{active: themeMode === 'light'}" @click="applyTheme('light')">СВЕ</button>
                </div>
                <button @click="exportAll" class="btn btn-save shadow-sm">💾 СОХРАНИТЬ ВСЕ</button>
                <a href="index.html" class="btn btn-outline-secondary rounded-pill">На сайт</a>
            </div>
        </div>

        <ul class="nav nav-pills mb-4 bg-white p-2 rounded-4 shadow-sm" style="width: fit-content;">
            <li class="nav-item"><button class="nav-link" :class="{active: tab === 'projects'}" @click="tab = 'projects'">📦 Проекты</button></li>
            <li class="nav-item"><button class="nav-link" :class="{active: tab === 'categories'}" @click="tab = 'categories'">📂 Категории</button></li>
            <li class="nav-item"><button class="nav-link" :class="{active: tab === 'contacts'}" @click="tab = 'contacts'">📇 Контакты</button></li>
            <li class="nav-item"><button class="nav-link" :class="{active: tab === 'donate'}" @click="tab = 'donate'">❤️ Донаты</button></li>
        </ul>

        <div v-if="tab === 'projects'">
            <div class="admin-card bg-light border-0 shadow-none">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold m-0 text-dark"><i class="fab fa-github me-2"></i>Доступные репозитории GitHub</h5>
                    <button @click="loadGitHub" class="btn btn-sm btn-outline-dark rounded-pill"><i class="fas fa-sync me-1"></i> Обновить список</button>
                </div>
                <div v-if="ghError" class="alert alert-warning py-2 small">{{ ghError }}</div>
                <div class="row g-2">
                    <div v-for="repo in ghRepos" :key="repo.id" class="col-md-4">
                        <div class="p-2 border rounded-3 bg-white d-flex justify-content-between align-items-center shadow-sm">
                            <span class="small fw-bold text-truncate me-2 text-dark">{{ repo.name }}</span>
                            <button v-if="!isLinked(repo.name)" @click="linkRepo(repo)" class="btn btn-primary btn-sm py-0 px-2 small">Настроить</button>
                            <span v-else class="badge bg-success small py-1">Связан</span>
                        </div>
                    </div>
                </div>
            </div>

            <hr class="my-4">

            <div class="admin-card">
                <h5 class="fw-bold mb-4">Создать новый проект</h5>
                <div class="row g-3">
                    <div class="col-md-4"><input type="text" v-model="newP.name" placeholder="Название проекта" class="form-control"></div>
                    <div class="col-md-4">
                        <select v-model="newP.category" class="form-control">
                            <option value="">Выберите категорию</option>
                            <option v-for="c in categories" :value="c.name">{{ c.name }}</option>
                        </select>
                    </div>
                    <div class="col-md-4"><button @click="addProject" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">СОЗДАТЬ</button></div>
                </div>
            </div>

            <div v-for="(p, idx) in products" :key="p.id" class="admin-card" :class="{'gh-item shadow-sm': p.is_github}">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="m-0 fw-bold">
                        <i v-if="p.is_github" class="fab fa-github me-2 text-primary"></i>
                        {{ p.name }}
                        <small class="text-muted ms-2">ID: {{ p.id }}</small>
                    </h5>
                    <button @click="products.splice(idx, 1)" class="btn btn-danger btn-sm rounded-pill px-3">Удалить</button>
                </div>

                <div class="row g-3">
                    <div class="col-md-3"><label class="small fw-bold">Название</label><input v-model="p.name" class="form-control"></div>
                    <div class="col-md-3">
                        <label class="small fw-bold">Категория</label>
                        <select v-model="p.category" class="form-control">
                            <option v-for="c in categories" :value="c.name">{{ c.name }}</option>
                        </select>
                    </div>
                    <div class="col-md-2"><label class="small fw-bold">Цена</label><input type="number" v-model="p.price" class="form-control"></div>
                    <div class="col-md-4">
                        <label class="small fw-bold">Опции</label>
                        <div class="d-flex gap-3 mt-2">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" v-model="p.is_github" :id="'gh-'+p.id">
                                <label class="form-check-label fw-bold" :for="'gh-'+p.id">🔗 GitHub</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" v-model="p.is_recommended" :id="'hot-'+p.id">
                                <label class="form-check-label text-warning fw-bold" :for="'hot-'+p.id">🔥 HOT</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" v-model="p.is_active" :id="'act-'+p.id">
                                <label class="form-check-label small" :for="'act-'+p.id">Активен</label>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="small fw-bold text-primary">Изображения (скриншоты)</label>
                        <div class="input-group">
                            <input :value="p.images?.join(', ')" @input="p.images = $event.target.value.split(',').map(i => i.trim())" class="form-control">
                            <button class="btn btn-outline-primary" @click="triggerUpload(p)">Загрузить</button>
                        </div>
                        <input type="file" :id="'file-'+p.id" class="d-none" accept="image/*" @change="handleFileUpload($event, p)">
                    </div>

                    <div class="col-md-6">
                        <label class="small fw-bold">Подкатегории</label>
                        <div class="subcategory-box">
                            <div v-for="sub in getSubcategories(p.category)" :key="sub" class="form-check form-check-inline me-3">
                                <input class="form-check-input" type="checkbox" :value="sub" v-model="p.subcategories" :id="'sub-'+p.id+'-'+sub">
                                <label class="form-check-label small" :for="'sub-'+p.id+'-'+sub">{{ sub }}</label>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-12">
                        <label class="small fw-bold">Описание (только для локальных)</label>
                        <textarea v-model="p.description" class="form-control" rows="2" :disabled="p.is_github"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- ДРУГИЕ ТАБЫ (БЕЗ ИЗМЕНЕНИЙ) -->
        <div v-if="tab === 'categories'">
            <div v-for="(c, idx) in categories" :key="idx" class="admin-card">
                <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
                    <h5 class="m-0 fw-bold">{{ c.name }}</h5>
                    <button @click="categories.splice(idx, 1)" class="btn btn-outline-danger btn-sm">Удалить</button>
                </div>
                <input :value="c.subcategories?.join(', ')" @input="c.subcategories = $event.target.value.split(',').map(s => s.trim()).filter(s => s)" class="form-control">
            </div>
            <button @click="categories.push({name:'New', subcategories:[]})" class="btn btn-primary rounded-pill">+ Категория</button>
        </div>

        <div v-if="tab === 'contacts'">
            <div class="admin-card">
                <h5 class="fw-bold mb-4">Мои контакты</h5>
                <div class="row g-3">
                    <div class="col-md-6"><label class="small">Имя</label><input v-model="config.myContacts.name" class="form-control"></div>
                    <div class="col-md-6"><label class="small">Telegram</label><input v-model="config.myContacts.telegram" class="form-control"></div>
                    <div class="col-md-12"><label class="small">Сайт</label><input v-model="config.myContacts.website" class="form-control"></div>
                </div>
            </div>
        </div>

        <div v-if="tab === 'donate'">
            <div class="admin-card">
                <div v-for="(m, idx) in config.donateMethods" :key="idx" class="mb-4 border-bottom pb-3">
                    <div class="row g-2">
                        <div class="col-md-3"><input v-model="m.name" class="form-control"></div>
                        <div class="col-md-4"><input v-if="'url' in m" v-model="m.url" class="form-control"><input v-else v-model="m.id" class="form-control"></div>
                        <div class="col-md-3"><input v-model="m.desc" class="form-control"></div>
                        <div class="col-md-1"><input v-model="m.icon" class="form-control"></div>
                        <div class="col-md-1"><button @click="config.donateMethods.splice(idx, 1)" class="btn btn-outline-danger"><i class="fas fa-trash"></i></button></div>
                    </div>
                </div>
                <button @click="config.donateMethods.push({name:'New', id:'', desc:'', icon:'donat.png'})" class="btn btn-primary rounded-pill">+ Метод</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, watch } = Vue;
        createApp({
            setup() {
                const repoOwner = 'komoliddin';
                const tab = ref(sessionStorage.getItem('admin_active_tab') || 'projects');
                const products = ref([]);
                const categories = ref([]);
                const ghRepos = ref([]);
                const ghError = ref('');
                const config = ref({ myContacts: {}, socialLinks: { main: [], others: [] }, donateMethods: [], publicStats: {} });
                const newP = ref({ name: '', category: '', price: 0, subcategories: [], images: ['image/logo.png'], is_active: true, is_github: false });
                const themeMode = ref(localStorage.getItem('theme_mode') || 'auto');

                watch(tab, (nt) => sessionStorage.setItem('admin_active_tab', nt));

                const applyTheme = (mode) => {
                    let t = mode;
                    if (mode === 'auto') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', t);
                    localStorage.setItem('theme_mode', mode);
                    themeMode.value = mode;
                };

                const loadGitHub = async () => {
                    ghError.value = '';
                    try {
                        const res = await fetch(`https://api.github.com/users/${repoOwner}/repos?sort=updated&per_page=100`);
                        if (res.ok) ghRepos.value = await res.json();
                        else if (res.status === 403) ghError.value = 'Лимит GitHub API исчерпан.';
                    } catch (e) { ghError.value = 'Ошибка загрузки с GitHub'; }
                };

                const loadData = async () => {
                    if (sessionStorage.getItem('admin_access') !== 'granted') { window.location.href = 'login.html'; return; }
                    const v = Date.now();
                    try {
                        products.value = await fetch(`projects.json?v=${v}`).then(r => r.json());
                        categories.value = await fetch(`categories.json?v=${v}`).then(r => r.json());
                        config.value = await fetch(`config.json?v=${v}`).then(r => r.json());
                        loadGitHub();
                    } catch (e) { console.error(e); }
                };

                const isLinked = (name) => products.value.some(p => p.name === name);
                const linkRepo = (repo) => {
                    if(!isLinked(repo.name)) {
                        products.value.unshift({ id: repo.id, name: repo.name, category: 'GitHub Проекты', price: 0, images: ['image/logo.png'], description: '', subcategories: [], is_active: true, is_github: true, stars: repo.stargazers_count, language: repo.language });
                    }
                };

                const getSubcategories = (catName) => {
                    const cat = categories.value.find(c => c.name === catName);
                    return cat ? (cat.subcategories || []) : [];
                };

                const addProject = () => { if(newP.value.name) { products.value.unshift({...newP.value, id: Date.now()}); newP.value.name=''; } };
                const triggerUpload = (p) => document.getElementById(`file-${p.id}`).click();
                const handleFileUpload = async (event, p) => {
                    const file = event.target.files[0]; if (!file) return;
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const filename = `${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
                        const res = await fetch('http://localhost:3000/upload-image', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: filename, data: e.target.result }) });
                        if (res.ok) { if(!p.images) p.images=[]; p.images.push(`image/${filename}`); alert("✅ Загружено!"); }
                    };
                    reader.readAsDataURL(file);
                };

                const exportAll = async () => {
                    try {
                        const payload = [{f:'projects.json', d:products.value}, {f:'categories.json', d:categories.value}, {f:'config.json', d:config.value}];
                        for (let i of payload) {
                            await fetch('http://localhost:3000/save-data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({filename:i.f, data:i.d}) });
                        }
                        alert("✅ СОХРАНЕНО!");
                    } catch (e) { alert("❌ Ошибка сервера"); }
                };

                onMounted(() => { applyTheme(themeMode.value); loadData(); });
                return { tab, products, categories, config, ghRepos, ghError, newP, isLinked, linkRepo, addProject, exportAll, triggerUpload, handleFileUpload, getSubcategories, themeMode, applyTheme, loadGitHub };
            }
        }).mount('#app');
    </script>
</body>
</html>
